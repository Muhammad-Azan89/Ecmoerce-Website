<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="x-icon" href="Images/logok.png">
    <title>Checkout</title>
    <style>
        body {
            background-image: linear-gradient(to left,black,red,yellow,red,black);
            color: black; 
        }
        .for {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .form {
            border: 1px solid rgb(0, 174, 255);
            height: 500px;
            width: 300px;
            border-radius: 5px;
            padding: 10px;
        }
        .center {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        input[type=text],input[type=email] {
            border-bottom: 1px solid rgb(43, 43, 255);
            border-top: 0;
            border-left: 0;
            border-right: 0;
            background-color: rgba(240, 255, 255, 0);
            color: black;
            width: 280px;
            padding: 10px;
            border-radius: 10px;
        }
        input[placeholder] {
            color: whites;
        }
        #button {
            padding: 10px 20px;
            background-color: black;
            color: white;
            border: 0;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="for">
        <img src="Images/logok.png" alt="Logo not found" height="200px" width="200px">
    </div>
    
    <div class="center">
        <div class="form">
            <h2>Checkout:</h2>
            <br>
            <form action="Tankyou.html" onsubmit="return helo()" action="Thankyou.html">
                <h2>Name:</h2>   
                <input type="text" name="name" placeholder="Enter Name" id="inputText">
                <p id="do" style="color: red; margin: 0;"></p>
    
                <h2>Email:</h2> 
                <input type="email" name="email" placeholder="Enter Email" id="kool">
                <p id="doo" style="color: red; margin: 0;"></p>
    
                <h2>Address:</h2>    
                <input type="text" name="address" placeholder="Enter street # or location" id="address">
                <p id="door" style="color: red; margin: 0;"></p>
    
                <input type="submit" id="button" value="Continue">
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
