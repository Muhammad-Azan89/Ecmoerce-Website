<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="x-icon" href="Images/logok.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>Register Yourself</title>
<style>
    #sign {
        background-color: white;
        padding: 10px 10px 50px;
        width: 400px;
        box-shadow: 0px 0px 10px 0px black;
        border-radius: 10px;
    }
    .strong input[type=email] {
    width: 380px;
    border: 0px solid black;
    background-color: rgb(172, 172, 172);
    padding: 10px;
    }
    .strong input[type=text] {
    width: 380px;
    border: 0px solid black;
    padding: 10px;
    background-color: rgb(172, 172, 172);
    }
    .strong input[type=password] {
    width: 380px;
    border: 0px solid black;
    padding: 10px;
    background-color: rgb(172, 172, 172);
    }
    .strong input[type=submit] {
        width: 400px;
    border: 0px solid black;

    padding: 13px;
    background-color: purple;
    color: white;
    }
    .dis {
        display: flex;
        justify-content: center;
        align-items: center;
        position: fixed;
        height: 100%;
        width: 100%;
        top: 0;
    }
</style>
</head>
<body style="background-color: rgb(214, 214, 214); margin: 0;">
    <div class="dis"> 
        <div id="sign">
            <h2 style="border-bottom: 5px solid purple; padding-left: 5px; padding: 10px; font-family: Arial, Helvetica, sans-serif; margin-left: 150px; margin-right: 150px;">Signup</h2>
            <form class="strong" action="index.html" onsubmit="return validateSignup()">
                <label>User Name</label>
                <input type="text" id="inputText" placeholder="Enter Name">
                <p id="message" style="color: red; display: none; margin: 0;"></p>
    
                <label>Email</label>
                <center><input type="email" name="email" placeholder="Enter Email" id="kool"></center>
                <p id="ch" style="color: red; display: none; margin: 0;"></p>
    
                <label>Password</label>
                <center><input type="password" name="password" placeholder="Enter Password" id="cool"></center>
                <p id="cha" style="color: red; display: none; margin: 0;"></p>
    
                <label>Confirm Password</label>
                <center><input type="password" name="password" placeholder="Enter Again" id="loop"></center>
                <p id="char" style="color: red; display: none; margin: 0;"></p><br>
    
                <center><input type="submit" value="Sign Up"></center> 
            </form>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
